<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Number Generator</title>
    <style>
        :root { --neon: #00ffcc; --neon-dark: #008877; --bg: #050505; --accent: #ff0055; --panel: #0a0a0a; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; transition: background 0.3s, direction 0.3s; overflow-x: hidden; }
        
        .box { border: 1px solid var(--neon-dark); padding: 15px; border-radius: 12px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.1); width: 100%; max-width: 1200px; background: var(--panel); display: flex; flex-direction: column; gap: 12px; transition: all 0.3s; }
        
        /* 頂部控制列 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .top-bar h2 { margin: 0; font-size: 1.2rem; color: #fff; text-shadow: 0 0 10px var(--neon); }
        select#lang-select { background: #001100; color: var(--neon); border: 1px solid var(--neon); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; font-weight: bold; }

        /* 種子顯示 */
        .seed-monitor { background: #001100; border: 1px solid #004400; padding: 12px; border-radius: 8px; }
        #seed-value { font-size: 1.1rem; color: #fff; font-weight: bold; word-break: break-all; }
        #seed-origin { font-size: 0.7rem; color: var(--neon-dark); margin-top: 4px; }

        /* 場域選擇 */
        .field-selector { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; max-height: 220px; overflow-y: auto; padding-right: 5px; }
        .field-selector::-webkit-scrollbar { width: 6px; }
        .field-selector::-webkit-scrollbar-thumb { background: var(--neon-dark); border-radius: 3px; }
        .field-card { border: 1px solid #004400; background: #000805; padding: 10px; cursor: pointer; border-radius: 6px; transition: 0.2s; text-align: center; }
        .field-card:hover { border-color: var(--neon-dark); }
        .field-card.active { border-color: var(--neon); background: #001a14; box-shadow: 0 0 10px rgba(0, 255, 204, 0.3); font-weight: bold; }

        /* 演算法細節面板 */
        .algo-details { background: #000a08; border: 1px dashed var(--neon-dark); padding: 12px; border-radius: 8px; font-size: 0.75rem; line-height: 1.5; color: #ccc; }
        .algo-details strong { color: var(--accent); display: inline-block; width: 65px; }
        .algo-formula { color: #fff; background: #000; padding: 2px 6px; border-radius: 3px; border: 1px solid #222; font-family: monospace; }

        /* 控制面板 */
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; background: #111; padding: 15px; border-radius: 8px; }
        .slider-group { display: flex; flex-direction: column; justify-content: center; }
        .slider-group label { font-size: 0.75rem; color: var(--neon-dark); margin-bottom: 8px; display: flex; justify-content: space-between; }
        .val-display { color: #fff; font-weight: bold; }
        input[type=range] { width: 100%; accent-color: var(--neon); cursor: pointer; }
        
        /* 雙滑桿 */
        .dual-slider-container { position: relative; height: 24px; width: 100%; display: flex; align-items: center; }
        .dual-slider-track { position: absolute; width: 100%; height: 6px; background: #333; border-radius: 3px; z-index: 1; }
        .dual-slider-fill { position: absolute; height: 6px; background: var(--neon); border-radius: 3px; z-index: 2; }
        .dual-slider-container input[type=range] { position: absolute; width: 100%; -webkit-appearance: none; appearance: none; background: transparent; z-index: 3; pointer-events: none; }
        .dual-slider-container input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; pointer-events: auto; width: 16px; height: 16px; border-radius: 50%; background: #fff; border: 2px solid var(--neon); cursor: pointer; box-shadow: 0 0 5px #000; }
        .dual-slider-container input[type=range]::-moz-range-thumb { pointer-events: auto; width: 16px; height: 16px; border-radius: 50%; background: #fff; border: 2px solid var(--neon); cursor: pointer; }

        /* 歷史日誌 */
        #console { background: #000; color: #00ff00; font-size: 0.7rem; padding: 10px; height: 110px; overflow-y: auto; border: 1px solid #111; border-radius: 4px; line-height: 1.4; }
        .log-time { color: #555; margin-right: 5px; }

        /* 輸出區域 */
        #output-area { background: #000; border: 1px solid #111; padding: 10px; min-height: 100px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; align-content: center; border-radius: 8px; -webkit-user-select: text; user-select: text; }
        .num-tag { background: #001a14; color: #fff; padding: 6px 10px; border-radius: 4px; border: 1px solid var(--neon); font-weight: bold; box-shadow: 0 0 5px rgba(0,255,204,0.1); display: inline-block; -webkit-user-select: text; user-select: text; transition: all 0.2s; }

        .progress-container { width: 100%; height: 4px; background: #111; border-radius: 2px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon), var(--accent)); transition: width 0.1s; }
        
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; font-size: 0.65rem; text-align: center; }
        .stat-val { color: #fff; font-weight: bold; display: block; font-size: 0.9rem; margin-top: 3px; }

        button#run_btn { background: var(--neon); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 1.1rem; transition: 0.2s; }
        button#run_btn:hover { background: #fff; box-shadow: 0 0 20px rgba(0,255,204,0.8); }
        button#run_btn.running { background: var(--accent); color: #fff; box-shadow: 0 0 20px rgba(255,0,85,0.6); }

        /* 浮動提示框 */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 255, 204, 0.9); color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 9999; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #toast.show { opacity: 1; }

        /* 全螢幕純淨模式 CSS */
        body.fullscreen-mode { padding: 0; background: #000; overflow: hidden; }
        body.fullscreen-mode .top-bar,
        body.fullscreen-mode .seed-monitor,
        body.fullscreen-mode .field-selector,
        body.fullscreen-mode .algo-details,
        body.fullscreen-mode .control-panel,
        body.fullscreen-mode #console,
        body.fullscreen-mode #run_btn,
        body.fullscreen-mode .stats { display: none !important; }
        
        body.fullscreen-mode .box { max-width: none; width: 100vw; height: 100vh; border: none; border-radius: 0; margin: 0; padding: 0; box-shadow: none; justify-content: flex-start; }
        body.fullscreen-mode .progress-container { height: 6px; border-radius: 0; flex-shrink: 0; z-index: 10; }
        body.fullscreen-mode #output-area { flex-grow: 1; border: none; border-radius: 0; padding: 30px 15px; overflow-y: auto; align-content: flex-start; background: #000; cursor: pointer; }
        body.fullscreen-mode .num-tag { margin: 8px; padding: 12px 20px; border-width: 2px; }

        @media (max-width: 600px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .top-bar h2 { font-size: 1rem; }
            .algo-details strong { display: block; margin-bottom: 2px; }
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="box">
    <div class="top-bar">
        <h2 id="ui_title">Random Number Generator</h2>
        <select id="lang-select" onchange="changeLang(this.value)"></select>
    </div>

    <div class="seed-monitor">
        <div id="seed-value" data-i18n="seed_wait">...</div>
        <div id="seed-origin" data-i18n="seed_origin">...</div>
    </div>

    <!-- 動態場域選單 -->
    <div class="field-selector" id="fields-container"></div>

    <!-- 演算法詳情說明 -->
    <div class="algo-details" id="algo-details">
        <div><strong data-i18n="lbl_input">Input</strong> <span id="det-input" data-i18n="input_desc"></span></div>
        <div style="margin: 6px 0;"><strong data-i18n="lbl_method">Method</strong> <span class="algo-formula" id="det-formula"></span> <span id="det-method"></span></div>
        <div><strong data-i18n="lbl_output">Output</strong> <span id="det-output" data-i18n="output_desc"></span></div>
    </div>

    <div class="control-panel">
        <div class="slider-group">
            <label><span data-i18n="label_dim">Dims</span> <span class="val-display" id="dim-val">10,000,000</span></label>
            <input type="range" id="dim-slider" min="10000" max="50000000" step="10000" value="10000000" oninput="updateDim()">
        </div>
        
        <div class="slider-group">
            <label><span data-i18n="label_range">Min~Max</span> <span class="val-display" id="range-val">0 ~ 10000</span></label>
            <div class="dual-slider-container">
                <div class="dual-slider-track"></div>
                <div class="dual-slider-fill" id="slider-fill"></div>
                <input type="range" id="range-min" min="0" max="9999" value="0" oninput="updateRange()">
                <input type="range" id="range-max" min="1" max="10000" value="10000" oninput="updateRange()">
            </div>
        </div>

        <div class="slider-group">
            <label><span data-i18n="label_count">Count</span> <span class="val-display" id="count-val">10</span></label>
            <input type="range" id="count-slider" min="1" max="500" value="10" oninput="updateCount()">
        </div>
    </div>

    <div id="console"></div>
    
    <div class="progress-container"><div id="progress-bar"></div></div>
    
    <!-- 結果輸出區 -->
    <div id="output-area"></div>
    
    <button id="run_btn" onclick="toggleProjector()"><span data-i18n="btn_run">GENERATE</span></button>

    <div class="stats">
        <div><span style="color:#777" data-i18n="stat_flops">FLOPs</span><span id="stat-flops" class="stat-val">0</span></div>
        <div><span style="color:#777" data-i18n="stat_time">Time (ms)</span><span id="stat-time" class="stat-val">0</span></div>
        <div><span style="color:#777" data-i18n="stat_speed">GFLOPS</span><span id="stat-speed" class="stat-val">0</span></div>
        <div><span style="color:#777" data-i18n="stat_progress">Progress</span><span id="stat-progress" class="stat-val">0%</span></div>
    </div>
</div>

        'hi': { name: 'हिन्दी', dir: 'ltr', t: { ui_title: "यादृच्छिक संख्या जनरेटर", btn_run: "उत्पन्न करें", btn_stop: "रोकें", msg_ready: "तैयार", msg_lock: "मॉडल: ", msg_fs_toast: "स्वाइप: बाहर | टैप: उत्पन्न | लॉन्ग प्रेस: चुनें" } },
        'pt': { name: 'Português', dir: 'ltr', t: { ui_title: "Gerador Aleatório", btn_run: "GERAR", btn_stop: "PARAR", msg_ready: "Pronto", msg_lock: "Modelo: ", msg_fs_toast: "Deslizar: Sair | Tocar: Gerar | Manter: Selecionar" } },
        'bn': { name: 'বাংলা', dir: 'ltr', t: { ui_title: "র্যান্ডম নম্বর জেনারেটর", btn_run: "তৈরি করুন", btn_stop: "থামুন", msg_ready: "প্রস্তুত", msg_lock: "মডেল: ", msg_fs_toast: "সোয়াইপ: প্রস্থান | ট্যাপ: তৈরি | দীর্ঘ প্রেস: নির্বাচন" } },
        'vi': { name: 'Tiếng Việt', dir: 'ltr', t: { ui_title: "Trình tạo số ngẫu nhiên", btn_run: "TẠO SỐ", btn_stop: "DỪNG LẠI", msg_ready: "Sẵn sàng", msg_lock: "Mô hình: ", msg_fs_toast: "Vuốt: Thoát | Chạm: Tạo | Nhấn giữ: Chọn" } },
        'th': { name: 'ไทย', dir: 'ltr', t: { ui_title: "เครื่องสุ่มตัวเลข", btn_run: "สร้างตัวเลข", btn_stop: "หยุด", msg_ready: "พร้อม", msg_lock: "โมเดล: ", msg_fs_toast: "ปัด: ออก | แตะ: สร้าง | กดค้าง: เลือก" } }
    };

    // 補齊翻譯
    const keys = Object.keys(dict['en'].t);
    for(let lang in dict) keys.forEach(k => { if(!dict[lang].t[k]) dict[lang].t[k] = dict['en'].t[k]; });

    const fieldIds =['quantum', 'fluid', 'finance', 'cauchy', 'weierstrass', 'mandelbrot', 'prime', 'riemann', 'lorenz', 'chirikov'];
    let currLang = 'zh-TW', currentField = 'quantum', historyLogs =[];
    let isRunning = false, shouldAbort = false, isFullscreen = false;

    function init() {
        const select = document.getElementById('lang-select');
        for(let lang in dict) select.innerHTML += `<option value="${lang}" ${lang==='zh-TW'?'selected':''}>${dict[lang].name}</option>`;
        logEvent('ready', null);
        updateDim(); updateRange(); updateCount(); changeLang(currLang);
    }

    function changeLang(lang) {
        currLang = lang; const t = dict[lang].t;
        document.body.style.direction = dict[lang].dir;
        document.getElementById('ui_title').innerText = t.ui_title;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n'); if (t[key]) el.innerText = t[key];
        });
        document.getElementById('run_btn').innerText = isRunning ? t.btn_stop : t.btn_run;

        const fc = document.getElementById('fields-container');
        fc.innerHTML = "";
        fieldIds.forEach(id => {
            fc.innerHTML += `<div class="field-card ${id===currentField?'active':''}" onclick="setField('${id}')"><div>${t[`fn_${id}`] || id}</div></div>`;
        });
        updateFieldDetails(); renderLogs();
    }

    function setField(id) {
        if (isRunning) return; currentField = id;
        document.querySelectorAll('.field-card').forEach(c => c.classList.remove('active'));
        event.currentTarget.classList.add('active');
        logEvent('lock', id); updateFieldDetails();
    }

    function updateFieldDetails() {
        const t = dict[currLang].t;
        document.getElementById('det-formula').innerText = fieldMath[currentField];
        document.getElementById('det-method').innerText = t[`fd_${currentField}`] || "";
    }

    function logEvent(type, val) {
        historyLogs.push({ time: new Date().toLocaleTimeString(), type: type, val: val });
        if(historyLogs.length > 50) historyLogs.shift();
        renderLogs();
    }

    function renderLogs() {
        const con = document.getElementById("console"); const t = dict[currLang].t;
        con.innerHTML = historyLogs.map(l => {
            let msg = "";
            if(l.type === 'ready') msg = t.msg_ready;
            else if(l.type === 'lock') msg = t.msg_lock + (t[`fn_${l.val}`] || l.val);
            else if(l.type === 'abort') msg = `<span style="color:var(--accent)">${t.msg_abort}</span>`;
            else if(l.type === 'done') msg = t.msg_done + Number(l.val).toLocaleString();
            return `<div><span class="log-time">[${l.time}]</span> ${msg}</div>`;
        }).join('');
        con.scrollTop = con.scrollHeight;
    }

    function updateDim() { document.getElementById('dim-val').innerText = Number(document.getElementById('dim-slider').value).toLocaleString(); }
    function updateCount() { document.getElementById('count-val').innerText = document.getElementById('count-slider').value; updateTagSizes(); }
    function updateRange() {
        let minEl = document.getElementById('range-min'), maxEl = document.getElementById('range-max');
        let minVal = parseInt(minEl.value), maxVal = parseInt(maxEl.value);
        if (minVal >= maxVal - 1) {
            if (this === minEl) minEl.value = maxVal - 1; else maxEl.value = minVal + 1;
            minVal = parseInt(minEl.value); maxVal = parseInt(maxEl.value);
        }
        document.getElementById('range-val').innerText = `${minVal} ~ ${maxVal}`;
        const maxR = 10000;
        document.getElementById('slider-fill').style.left = `${(minVal/maxR)*100}%`;
        document.getElementById('slider-fill').style.width = `${((maxVal-minVal)/maxR)*100}%`;
    }

    // --- 觸控滑動全螢幕 & 事件邏輯 ---
    let touchStartX = 0, touchStartY = 0, swipeEnabled = true;

    document.addEventListener('touchstart', e => {
        const tag = e.target.tagName.toLowerCase();
        // 如果碰到可以拖曳的輸入框或下拉選單，禁止判定為滑動切換
        if (tag === 'input' || tag === 'select' || tag === 'button') { swipeEnabled = false; return; }
        swipeEnabled = true;
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: true});

    document.addEventListener('touchend', e => {
        if (!swipeEnabled) return;
        let touchEndX = e.changedTouches[0].screenX, touchEndY = e.changedTouches[0].screenY;
        let dx = touchEndX - touchStartX, dy = touchEndY - touchStartY;
        // 判定左右滑動 (X軸移動大於60，且大於Y軸移動幅度)
        if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) toggleFullscreen();
    }, {passive: true});

    function toggleFullscreen() {
        isFullscreen = !document.body.classList.contains('fullscreen-mode');
        if (isFullscreen) {
            document.body.classList.add('fullscreen-mode');
            showToast(dict[currLang].t.msg_fs_toast);
        } else {
            document.body.classList.remove('fullscreen-mode');
        }
        updateTagSizes();
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg; toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // 點擊全螢幕區塊時重抽，但若「選取文字(長按)」則不觸發
    document.getElementById('output-area').addEventListener('click', (e) => {
        if (!isFullscreen) return;
        const selectedText = window.getSelection().toString().trim();
        // 如果長按觸發了系統複製選取，就禁止生成新的隨機數
        if (selectedText.length > 0) return; 
        if (!isRunning) toggleProjector();
    });

    function updateTagSizes() {
        const count = parseInt(document.getElementById("count-slider").value);
        let fs = count > 150 ? 0.8 : (count > 50 ? 1.2 : 1.8);
        if (isFullscreen) fs *= 1.5; // 全螢幕時數字放大
        document.querySelectorAll('.num-tag').forEach(tag => tag.style.fontSize = fs + 'rem');
    }

    // --- 核心運算 ---
    async function toggleProjector() {
        const btn = document.getElementById("run_btn");
        const t = dict[currLang].t;

        if (isRunning) {
            shouldAbort = true; btn.innerText = "Aborting..."; return;
        }

        isRunning = true; shouldAbort = false;
        btn.classList.add("running"); btn.innerText = t.btn_stop;
        document.getElementById("output-area").innerHTML = "";

        const dims = parseInt(document.getElementById("dim-slider").value);
        const minV = parseInt(document.getElementById("range-min").value);
        const maxV = parseInt(document.getElementById("range-max").value);
        const count = parseInt(document.getElementById("count-slider").value);
        const rangeSize = maxV - minV + 1;
        
        const now = Date.now();
        const baseSeed = (now % 1000000) * 1.61803398875;
        document.getElementById("seed-value").innerText = `SEED: ${baseSeed.toFixed(8)}`;
        document.getElementById("seed-origin").innerText = `T[${now}] × φ`;

        const startTime = performance.now(); let totalFlops = 0;
        
        let fs = count > 150 ? 0.8 : (count > 50 ? 1.2 : 1.8);
        if (isFullscreen) fs *= 1.5;

        for (let c = 0; c < count; c++) {
            if (shouldAbort) break;

            let energy = 0; let S = baseSeed + (c * 1.37); 
            
            const prog = (((c+1)/count)*100).toFixed(0);
            document.getElementById("stat-progress").innerText = prog + "%";
            document.getElementById("progress-bar").style.width = prog + "%";
            
            if (c % 3 === 0 || dims > 2000000) await new Promise(r => setTimeout(r, 0));
            if (shouldAbort) break;

            for (let j = 1; j <= dims; j++) {
                switch(currentField) {
                    case 'quantum': energy += Math.tan(Math.sin(S * Math.sqrt(j)) * Math.cos(S * Math.pow(j, 0.33))); break;
                    case 'fluid':   energy += Math.sin(S * j) / (1 + Math.log(1 + S * j * j)); break;
                    case 'finance': energy += Math.exp(-S * j / dims) * Math.sin(S * Math.sqrt(j) * 3.1415); break;
                    case 'cauchy':  
                        let t_val = Math.tan(S * j); if(isFinite(t_val)) energy += t_val; break;
                    case 'weierstrass': energy += Math.cos(Math.pow(1.5, j % 50) * Math.PI * S) / Math.pow(2, j % 50); break;
                    case 'mandelbrot': energy += Math.log(Math.abs(Math.sin(S * j) + Math.cos(S / j)) + 1); break;
                    case 'prime':   energy += ((S * j * 104729) % 999983) / 1000000; break;
                    case 'riemann': energy += Math.sin(S * Math.log(j)) / (1 + Math.sqrt(j)); break;
                    case 'lorenz':  energy += Math.sin(S*j) * Math.cos(S*j*1.41) * Math.tan(S*j*2.71); break;
                    case 'chirikov': energy += Math.sin(S * j + Math.sin(S * j)); break;
                }
            }
            
            let finalVal = Math.floor((Math.abs(energy) * 1000000) % rangeSize) + minV;
            if (isNaN(finalVal)) finalVal = minV;

            const tag = document.createElement("div");
            tag.className = "num-tag";
            tag.style.fontSize = fs + 'rem';
            tag.innerText = finalVal;
            document.getElementById("output-area").appendChild(tag);
            
            totalFlops += dims * (currentField==='cauchy'?2:6); 
            const elapsed = performance.now() - startTime;
            
            document.getElementById("stat-flops").innerText = totalFlops.toLocaleString();
            document.getElementById("stat-time").innerText = elapsed.toFixed(0);
            if(elapsed > 0) document.getElementById("stat-speed").innerText = ((totalFlops / (elapsed / 1000)) / 1e9).toFixed(2);
        }

        if (shouldAbort) {
            logEvent('abort', null); document.getElementById("stat-progress").innerText = "Aborted";
        } else {
            logEvent('done', dims);
        }

        isRunning = false; shouldAbort = false;
        btn.classList.remove("running"); btn.innerText = dict[currLang].t.btn_run;
    }

    window.onload = init;
</script>
